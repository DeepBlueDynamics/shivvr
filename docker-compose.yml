services:
  shivvr:
    build: .
    ports:
      - "8085:8080"
    environment:
      - PORT=8080
      - MODEL_PATH=/models/gtr-t5-base.onnx
      - TOKENIZER_PATH=/models/tokenizer.json
      - LD_LIBRARY_PATH=/usr/lib/onnxruntime
      - OPENAI_API_KEY
      # Optional: set NUTS_AUTH_JWKS_URL to enable authentication
      # - NUTS_AUTH_JWKS_URL=
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
