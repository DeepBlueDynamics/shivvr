services:
  shivvr:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MODEL_PATH=/models/gtr-t5-base.onnx
      - TOKENIZER_PATH=/models/tokenizer.json
      - DATA_PATH=/data/shivvr
    volumes:
      - shivvr-data:/data
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  shivvr-data:
