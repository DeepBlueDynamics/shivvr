[package]
name = "lume-hybrid"
version = "0.1.0"
edition = "2021"
description = "Vendored subset of lume's FST tagger + BM25 hybrid search. Upstream: https://github.com/DeepBlueDynamics/lume"
license = "MIT"

[dependencies]
tantivy-fst = "0.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[lib]
path = "src/lib.rs"
